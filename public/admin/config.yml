backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "catalog"
    label: "Store Catalog"
    files:
      - label: "Books Database"
        name: "books_db"
        file: "src/data/books.json"
        description: "Manage the entire catalog of books"
        fields:
          - name: "books"
            label: "Books List"
            widget: "list"
            fields:
              - {label: "ID (slug)", name: "id", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Author", name: "author", widget: "string"}
              - {label: "Category", name: "category", widget: "string"}
              - {label: "Rating", name: "rating", widget: "number", value_type: "float", min: 0, max: 5}
              - {label: "Price", name: "price", widget: "number", value_type: "float"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "ISBN", name: "isbn", widget: "string"}
              - {label: "Pages", name: "pages", widget: "number"}
              - {label: "Language", name: "language", widget: "string", default: "English"}
              - {label: "Publisher", name: "publisher", widget: "string"}
              - {label: "Published Year", name: "publishedYear", widget: "number"}
              - {label: "Bestseller", name: "bestseller", widget: "boolean", default: false}
              - {label: "Featured", name: "featured", widget: "boolean", default: false}
              - {label: "Cover Color", name: "coverColor", widget: "select", options: ["emerald", "darkgray", "blue", "purple", "rose", "slate", "indigo", "amber", "teal"]}
              - {label: "Cover ID (Random integer for SVG)", name: "coverId", widget: "number"}
